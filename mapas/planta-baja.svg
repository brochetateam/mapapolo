  <g class="zone" data-space="modulo2" data-name="Módulo 2">
    <rect x="550" y="350" width="60" height="70" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <text x="580" y="388" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="600" font-family="Inter, system-ui">OF 4</text>
  </g>

