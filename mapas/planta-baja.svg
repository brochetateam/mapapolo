    <rect x="10" y="110" width="12" height="12" rx="3" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="28" y="120" fill="#475569" font-size="8" font-family="Inter, system-ui">Oficinas / Módulos</text>
    <rect x="10" y="130" width="12" height="12" rx="3" fill="#fef9c3" stroke="#eab308" stroke-width="1"/>
    <text x="28" y="140" fill="#475569" font-size="8" font-family="Inter, system-ui">Showroom</text>
