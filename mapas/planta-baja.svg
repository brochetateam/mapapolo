  <rect x="40" y="100" width="60" height="50" rx="4" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <text x="70" y="130" text-anchor="middle" fill="#64748b" font-size="8" font-family="Inter, system-ui">Almacén 4</text>

  <!-- Almacén 5 (oeste) -->
  <rect x="40" y="155" width="60" height="50" rx="4" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
