  <text x="300" y="590" text-anchor="middle" fill="#64748b" font-size="8" font-family="Inter, system-ui">S2</text>

  <!-- CW2 -->
  <g class="zone" data-space="modulo1" data-name="Zona Coworking Baja">
    <rect x="340" y="570" width="80" height="30" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
    <text x="380" y="590" text-anchor="middle" fill="#1d4ed8" font-size="8" font-weight="500" font-family="Inter, system-ui">CW2</text>
  </g>

  <!-- CW1 -->
  <g class="zone" data-space="modulo1" data-name="Zona Coworking Baja">
    <rect x="550" y="570" width="80" height="30" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
    <text x="590" y="590" text-anchor="middle" fill="#1d4ed8" font-size="8" font-weight="500" font-family="Inter, system-ui">CW1</text>
  </g>

