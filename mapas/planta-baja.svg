  <g class="zone" data-space="modulo2" data-name="Módulo 2">
    <rect x="550" y="430" width="60" height="70" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <text x="580" y="468" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="600" font-family="Inter, system-ui">OF 5</text>
  </g>

  <!-- OF 6 -->
  <g class="zone" data-space="modulo2" data-name="Módulo 2">
    <rect x="630" y="500" width="80" height="60" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <text x="670" y="528" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="600" font-family="Inter, system-ui">OF 6</text>
  </g>

