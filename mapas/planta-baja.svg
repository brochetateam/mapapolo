  <text x="450" y="618" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Inter, system-ui">Avda. Sor Teresa Prat, 15 (Tabacalera) — Polo Nacional de Contenidos Digitales</text>

  <!-- Leyenda de colores -->
  <g transform="translate(630, 290)">
    <rect x="0" y="0" width="140" height="190" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1" opacity="0.9"/>
    <text x="10" y="20" fill="#334155" font-size="9" font-weight="600" font-family="Inter, system-ui">LEYENDA</text>
    <rect x="10" y="30" width="12" height="12" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
    <text x="28" y="40" fill="#475569" font-size="8" font-family="Inter, system-ui">Entrada / Recepción</text>
    <rect x="10" y="50" width="12" height="12" rx="3" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="28" y="60" fill="#475569" font-size="8" font-family="Inter, system-ui">Ágora / Eventos</text>
    <rect x="10" y="70" width="12" height="12" rx="3" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
    <text x="28" y="80" fill="#475569" font-size="8" font-family="Inter, system-ui">Patios / Descanso</text>
