  <text x="660" y="150" text-anchor="middle" fill="#64748b" font-size="8" font-family="Inter, system-ui">Almacén</text>

  <!-- WC (noreste) -->
  <rect x="700" y="125" width="40" height="40" rx="4" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <text x="720" y="150" text-anchor="middle" fill="#64748b" font-size="8" font-family="Inter, system-ui">WC</text>

  <!-- ==================== ZONA OESTE ==================== -->

