<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" fill="none">
  <!-- PLANTA BAJA — Polo Nacional de Contenidos Digitales -->
  <!-- Plano vectorizado interactivo -->

  <!-- Background -->
  <rect width="900" height="620" rx="16" fill="#f8fafc"/>

  <!-- Edificio exterior -->
  <rect x="40" y="40" width="820" height="540" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>

  <!-- ==================== PASILLOS ==================== -->
  <!-- Pasillo central horizontal -->
  <rect x="180" y="280" width="540" height="60" fill="#cbd5e1" rx="2"/>
  <text x="450" y="316" text-anchor="middle" fill="#64748b" font-size="11" font-weight="500" font-family="Inter, system-ui">PASILLO CENTRAL</text>

  <!-- Pasillo vertical izquierdo -->
  <rect x="180" y="100" width="40" height="300" fill="#cbd5e1" rx="2"/>

  <!-- Pasillo vertical derecho -->
  <rect x="580" y="100" width="40" height="300" fill="#cbd5e1" rx="2"/>

  <!-- ==================== ZONA NORTE ==================== -->

  <!-- Entrada IAT (norte) -->
  <g class="zone" data-space="recepcion" data-name="Entrada IAT">
    <rect x="350" y="40" width="200" height="50" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="450" y="70" text-anchor="middle" fill="#1d4ed8" font-size="12" font-weight="600" font-family="Inter, system-ui">ENTRADA IAT</text>
  </g>

  <!-- Recepción / Hall -->
  <g class="zone" data-space="recepcion" data-name="Recepción / Hall">
    <rect x="220" y="100" width="160" height="90" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="300" y="140" text-anchor="middle" fill="#1d4ed8" font-size="12" font-weight="600" font-family="Inter, system-ui">Recepción</text>
    <text x="300" y="158" text-anchor="middle" fill="#3b82f6" font-size="10" font-family="Inter, system-ui">/ Hall</text>
  </g>

  <!-- Ágora 1 (noreste) -->
  <g class="zone" data-space="agora" data-name="Ágora 1">
    <rect x="630" y="40" width="140" height="80" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="700" y="78" text-anchor="middle" fill="#b45309" font-size="12" font-weight="600" font-family="Inter, system-ui">Ágora 1</text>
    <text x="700" y="96" text-anchor="middle" fill="#d97706" font-size="9" font-family="Inter, system-ui">Eventos</text>
  </g>

  <!-- Almacén (noreste) -->
