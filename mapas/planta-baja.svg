    <text x="275" y="382" text-anchor="middle" fill="#6d28d9" font-size="11" font-weight="600" font-family="Inter, system-ui">AU 1</text>
    <text x="275" y="400" text-anchor="middle" fill="#7c3aed" font-size="8" font-family="Inter, system-ui">Formación</text>
