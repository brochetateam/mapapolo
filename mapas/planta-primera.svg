<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" fill="none">
  <!-- PLANTA PRIMERA — Polo Nacional de Contenidos Digitales -->
  <!-- Plano vectorizado interactivo -->

  <!-- Background -->
  <rect width="900" height="620" rx="16" fill="#f8fafc"/>

  <!-- Edificio exterior -->
  <rect x="40" y="40" width="820" height="540" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>

  <!-- ==================== PASILLOS ==================== -->
  <!-- Pasillo central horizontal -->
  <rect x="180" y="280" width="540" height="60" fill="#cbd5e1" rx="2"/>
  <text x="450" y="316" text-anchor="middle" fill="#64748b" font-size="11" font-weight="500" font-family="Inter, system-ui">PASILLO CENTRAL</text>

  <!-- Pasillo vertical izquierdo -->
  <rect x="180" y="100" width="40" height="300" fill="#cbd5e1" rx="2"/>

  <!-- Pasillo vertical derecho -->
  <rect x="580" y="100" width="40" height="300" fill="#cbd5e1" rx="2"/>

  <!-- ==================== ZONA NORTE ==================== -->

  <!-- Recepción Planta Primera -->
  <g class="zone" data-space="recepcion2" data-name="Recepción Planta Primera">
    <rect x="350" y="40" width="200" height="50" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="450" y="70" text-anchor="middle" fill="#1d4ed8" font-size="12" font-weight="600" font-family="Inter, system-ui">RECEPCIÓN P1</text>
  </g>

  <!-- ==================== COWORKING ==================== -->

  <!-- Go2Work Coworking -->
  <g class="zone" data-space="coworking" data-name="Go2Work — Coworking">
    <rect x="220" y="100" width="340" height="110" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2.5"/>
    <text x="390" y="142" text-anchor="middle" fill="#1d4ed8" font-size="16" font-weight="700" font-family="Inter, system-ui">Go2Work</text>
    <text x="390" y="162" text-anchor="middle" fill="#3b82f6" font-size="11" font-family="Inter, system-ui">Coworking — Startups Emergentes</text>
    <text x="390" y="180" text-anchor="middle" fill="#60a5fa" font-size="9" font-family="Inter, system-ui">64Train · OWO Game</text>
  </g>

  <!-- ==================== LABORATORIOS ==================== -->

  <!-- Lab VR / XR -->
  <g class="zone" data-space="lab-vr" data-name="Laboratorio de Realidad Virtual">
    <rect x="630" y="100" width="140" height="110" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2.5"/>
    <text x="700" y="140" text-anchor="middle" fill="#6d28d9" font-size="12" font-weight="700" font-family="Inter, system-ui">Lab VR / XR</text>
    <text x="700" y="158" text-anchor="middle" fill="#7c3aed" font-size="9" font-family="Inter, system-ui">Realidad Virtual</text>
    <text x="700" y="173" text-anchor="middle" fill="#8b5cf6" font-size="9" font-family="Inter, system-ui">Apple Vision Pro</text>
    <text x="700" y="188" text-anchor="middle" fill="#8b5cf6" font-size="9" font-family="Inter, system-ui">Meta Quest 3</text>
    <text x="700" y="200" text-anchor="middle" fill="#a78bfa" font-size="7" font-family="Inter, system-ui">Best Ride · CienciaVR · Mickrea</text>
  </g>

  <!-- Estudio Audio -->
  <g class="zone" data-space="lab-audio" data-name="Estudio de Grabación de Audio">
    <rect x="630" y="220" width="140" height="90" rx="8" fill="#f0fdfa" stroke="#14b8a6" stroke-width="2.5"/>
    <text x="700" y="252" text-anchor="middle" fill="#0d9488" font-size="12" font-weight="700" font-family="Inter, system-ui">Estudio Audio</text>
    <text x="700" y="270" text-anchor="middle" fill="#14b8a6" font-size="9" font-family="Inter, system-ui">Grabación / Mezcla</text>
    <text x="700" y="285" text-anchor="middle" fill="#2dd4bf" font-size="9" font-family="Inter, system-ui">Pro Tools / Doblaje</text>
    <text x="700" y="300" text-anchor="middle" fill="#5eead4" font-size="7" font-family="Inter, system-ui">Krilloud · Tal · Heqate</text>
  </g>

  <!-- ==================== LABORATORIOS SUR ==================== -->

  <!-- Lab Video -->
  <g class="zone" data-space="lab-video" data-name="Estudio de Grabación de Video">
    <rect x="430" y="350" width="140" height="90" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2.5"/>
    <text x="500" y="382" text-anchor="middle" fill="#dc2626" font-size="12" font-weight="700" font-family="Inter, system-ui">Lab Video</text>
    <text x="500" y="400" text-anchor="middle" fill="#ef4444" font-size="9" font-family="Inter, system-ui">Estudio 8K</text>
    <text x="500" y="415" text-anchor="middle" fill="#f87171" font-size="9" font-family="Inter, system-ui">Cromas / Iluminación</text>
    <text x="500" y="430" text-anchor="middle" fill="#fca5a5" font-size="7" font-family="Inter, system-ui">Heqate · Málaga Film</text>
  </g>

  <!-- Lab 3D -->
  <g class="zone" data-space="lab-3d" data-name="Laboratorio de Prototipado 3D">
    <rect x="430" y="450" width="140" height="90" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2.5"/>
    <text x="500" y="482" text-anchor="middle" fill="#c2410c" font-size="12" font-weight="700" font-family="Inter, system-ui">Lab 3D</text>
    <text x="500" y="500" text-anchor="middle" fill="#ea580c" font-size="9" font-family="Inter, system-ui">Impresión 3D</text>
    <text x="500" y="515" text-anchor="middle" fill="#f97316" font-size="9" font-family="Inter, system-ui">FDM / Resina / Láser</text>
    <text x="500" y="530" text-anchor="middle" fill="#fb923c" font-size="7" font-family="Inter, system-ui">~20 impresoras</text>
  </g>

  <!-- ==================== DESPACHOS (oeste) ==================== -->

  <!-- Despacho 3 -->
  <g class="zone" data-space="despacho3" data-name="Despacho 3">
    <rect x="220" y="350" width="140" height="90" rx="6" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="290" y="382" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600" font-family="Inter, system-ui">Despacho 3</text>
    <text x="290" y="400" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Inter, system-ui">Estudio Creativo</text>
    <text x="290" y="415" text-anchor="middle" fill="#60a5fa" font-size="7" font-family="Inter, system-ui">Murciélagos · Eartes</text>
    <text x="290" y="428" text-anchor="middle" fill="#60a5fa" font-size="7" font-family="Inter, system-ui">Pablo Becerra</text>
  </g>

  <!-- Despacho 4 -->
  <g class="zone" data-space="despacho4" data-name="Despacho 4">
    <rect x="220" y="450" width="140" height="90" rx="6" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="290" y="482" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600" font-family="Inter, system-ui">Despacho 4</text>
    <text x="290" y="500" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Inter, system-ui">Producción</text>
    <text x="290" y="515" text-anchor="middle" fill="#60a5fa" font-size="7" font-family="Inter, system-ui">Featlander · Red Vel</text>
    <text x="290" y="528" text-anchor="middle" fill="#60a5fa" font-size="7" font-family="Inter, system-ui">Inakin · Twindustry</text>
  </g>

  <!-- Despacho 5 -->
  <g class="zone" data-space="despacho5" data-name="Despacho 5">
    <rect x="380" y="550" width="100" height="50" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <text x="430" y="575" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="600" font-family="Inter, system-ui">Despacho 5</text>
    <text x="430" y="590" text-anchor="middle" fill="#94a3b8" font-size="7" font-family="Inter, system-ui">I+D</text>
  </g>

  <!-- ==================== OFICINAS ADICIONALES ==================== -->

  <!-- OF P1-1 -->
  <g class="zone" data-space="despacho5" data-name="Oficina P1-1">
    <rect x="630" y="350" width="70" height="60" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <text x="665" y="378" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="600" font-family="Inter, system-ui">OF P1-1</text>
  </g>

  <!-- OF P1-2 -->
  <g class="zone" data-space="despacho5" data-name="Oficina P1-2">
    <rect x="710" y="350" width="60" height="60" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <text x="740" y="378" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="600" font-family="Inter, system-ui">OF P1-2</text>
  </g>

  <!-- OF P1-3 -->
  <g class="zone" data-space="despacho5" data-name="Oficina P1-3">
    <rect x="630" y="420" width="70" height="60" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <text x="665" y="448" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="600" font-family="Inter, system-ui">OF P1-3</text>
  </g>

  <!-- OF P1-4 -->
  <g class="zone" data-space="despacho5" data-name="Oficina P1-4">
    <rect x="710" y="420" width="60" height="60" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <text x="740" y="448" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="600" font-family="Inter, system-ui">OF P1-4</text>
  </g>

  <!-- ==================== ZONA SUR ==================== -->

  <!-- Sala de reuniones -->
  <g class="zone" data-space="recepcion2" data-name="Sala de Reuniones">
    <rect x="220" y="550" width="100" height="50" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="270" y="575" text-anchor="middle" fill="#475569" font-size="10" font-weight="500" font-family="Inter, system-ui">Sala Reuniones</text>
  </g>

  <!-- ==================== LABELS ==================== -->
  <text x="450" y="28" text-anchor="middle" fill="#334155" font-size="14" font-weight="700" font-family="Inter, system-ui">PLANTA PRIMERA</text>
  <text x="450" y="618" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Inter, system-ui">Avda. Sor Teresa Prat, 15 (Tabacalera) — Polo Nacional de Contenidos Digitales</text>

  <!-- Leyenda -->
  <g transform="translate(40, 350)">
    <rect x="0" y="0" width="130" height="160" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1" opacity="0.9"/>
    <text x="10" y="20" fill="#334155" font-size="9" font-weight="600" font-family="Inter, system-ui">LEYENDA</text>
    <rect x="10" y="30" width="12" height="12" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
    <text x="28" y="40" fill="#475569" font-size="8" font-family="Inter, system-ui">Coworking / Recepción</text>
    <rect x="10" y="50" width="12" height="12" rx="3" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
    <text x="28" y="60" fill="#475569" font-size="8" font-family="Inter, system-ui">Lab Realidad Virtual</text>
    <rect x="10" y="70" width="12" height="12" rx="3" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1"/>
    <text x="28" y="80" fill="#475569" font-size="8" font-family="Inter, system-ui">Lab Audio</text>
    <rect x="10" y="90" width="12" height="12" rx="3" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
    <text x="28" y="100" fill="#475569" font-size="8" font-family="Inter, system-ui">Lab Video</text>
    <rect x="10" y="110" width="12" height="12" rx="3" fill="#fff7ed" stroke="#ea580c" stroke-width="1"/>
    <text x="28" y="120" fill="#475569" font-size="8" font-family="Inter, system-ui">Lab 3D / Prototipado</text>
    <rect x="10" y="130" width="12" height="12" rx="3" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="28" y="140" fill="#475569" font-size="8" font-family="Inter, system-ui">Despachos / Oficinas</text>
  </g>
</svg>
