<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MapaPolo — Directorio Inteligente del Polo de Contenidos Digitales</title>
  <meta name="description" content="Mapa interactivo del Polo Nacional de Contenidos Digitales de Málaga. Busca sinergias entre empresas, explora los laboratorios y navega por las instalaciones.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23005cb9'/><text x='50' y='68' text-anchor='middle' fill='white' font-size='50' font-weight='bold' font-family='system-ui'>P</text></svg>">

  <!-- Styles -->
  <link rel="stylesheet" href="css/estilo.css">
</head>
<body>

  <!-- ======== HEADER ======== -->
  <header class="header">
    <div class="header-inner">
      <!-- Logo -->
      <a href="/" class="logo">
        <div class="logo-icon">P</div>
        <div class="logo-text">
          <span class="logo-title">MapaPolo</span>
          <span class="logo-sub">Polo Nacional de Contenidos Digitales · Málaga</span>
        </div>
      </a>

      <!-- Búsqueda -->
      <div class="search-container">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Busca empresas, tecnologías o espacios... (ej: 'estudio de grabación para doblaje')"
          autocomplete="off"
        >
        <span class="search-hint">ESC para limpiar</span>
        <div id="searchResults" class="search-results"></div>
      </div>

      <!-- Acciones -->
      <div class="header-actions">
        <button id="themeToggle" class="btn-icon" title="Cambiar tema">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
      </div>
    </div>
  </header>

            <line x1="3" y1="12" x2="21" y2="12"/>
          </svg>
          Planta Baja
          <span class="badge">12 zonas</span>
        </button>

            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <line x1="3" y1="9" x2="21" y2="9"/>
            <line x1="3" y1="15" x2="21" y2="15"/>

          Planta Primera
          <span class="badge">10 zonas</span>
